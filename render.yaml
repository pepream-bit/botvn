services:
  - type: web
    name: telegram-broadcast-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WHITELIST_IDS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: 10000
