<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Operations Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar for Stats/Info -->
        <aside class="sidebar glass-panel">
            <div class="logo-container">
                <div class="logo-glow"></div>
                <h1>Dark VN Bot</h1>
                <p class="subtitle">Operations Center</p>
            </div>
            
            <div class="status-container">
                <div class="status-indicator">
                    <span class="pulse"></span>
                    <span class="status-text">System Online</span>
                </div>
            </div>

            <div class="nav-menu">
                <div class="nav-item active">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    Live Logs
                </div>
                <!-- Additional sections can be added here later -->
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar glass-panel">
                <h2>Real-time Logs</h2>
                <div class="filter-controls">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="info">Info</button>
                    <button class="filter-btn" data-filter="warn">Warning</button>
                    <button class="filter-btn" data-filter="error">Error</button>
                </div>
            </header>
            
            <div class="log-viewer-container glass-panel">
                <div class="log-header">
                    <span>Timestamp</span>
                    <span>Type</span>
                    <span>Message</span>
                </div>
                <div id="log-container" class="logs-list">
                    <!-- Logs will be dynamically injected here -->
                    <div class="log-entry info fade-in">
                        <span class="log-time">Now</span>
                        <span class="log-badge info">SYSTEM</span>
                        <span class="log-msg">Waiting for incoming logs...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
